<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>finndev62 @ Real WASM Linux Emulator</title>
    <link rel="stylesheet" href="https://copy.sh/v86/v86.css">
    <style>
        body { background: #0c0c0c; color: #fff; font-family: monospace; padding: 20px; }
        .emulator-container { max-width: 900px; margin: 0 auto; }
        #screen_container { white-space: pre; font-family: monospace; font-size: 14px; line-height: 1.2; background: #000; border: 1px solid #333; padding: 10px; border-radius: 4px; }
        .info-bar { margin-top: 15px; color: #888; font-size: 13px; }
    </style>
</head>
<body>

<div class="emulator-container">
    <h3 style="color: #00ff00;">Booting Real Linux Kernel via WebAssembly...</h3>
    
    <div id="screen_container"></div>
    
    <div class="info-bar">
        <p>Status: Emulating x86 CPU | Core: Linux Kernel | Utilities: PRoot Sandbox Ready</p>
        <p><i>Note: Click inside the terminal to capture keyboard input.</i></p>
    </div>
</div>

<script src="https://copy.sh/v86/build/v86_all.js"></script>
<script>
window.onload = function() {
    // Emulator konfigürasyonu
    var emulator = new V86Starter({
        wasm_path: "https://copy.sh/v86/build/v86.wasm",
        memory_size: 32 * 1024 * 1024, // 32MB RAM minimalist Linux için yeterlidir
        vga_as_text_mode: true,
        
        // Buradaki imajları kendi minimalist Linux kernel ve buildroot imajlarınla değiştirebilirsin
        bzimage: "https://copy.sh/v86/images/buildroot-bzimage.bin", 
        ext2: "https://copy.sh/v86/images/buildroot-ext2.img",
        
        screen_container: document.getElementById("screen_container"),
        autostart: true,
    });
};
</script>

</body>
      </html>
